<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>用户注册</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
    <div class="container">
        <div class="card shadow-sm mx-auto" style="max-width:500px">
            <div class="card-header bg-primary text-white"><h5 class="mb-0">用户信息注册</h5></div>
            <div class="card-body">
                <form id="userForm">
                    <div class="mb-3"><label class="form-label">用户姓名</label><input type="text" class="form-control" name="userName" required></div>
                    <div class="mb-3"><label class="form-label">密码</label><input type="password" class="form-control" name="password" required></div>
                    <div class="mb-3"><label class="form-label">性别</label>
                        <div class="form-check form-check-inline"><input class="form-check-input" type="radio" name="sex" value="男" checked><label class="form-check-label">男</label></div>
                        <div class="form-check form-check-inline"><input class="form-check-input" type="radio" name="sex" value="女"><label class="form-check-label">女</label></div>
                    </div>
                    <div class="mb-3"><label class="form-label">邮箱</label><input type="email" class="form-control" name="email" required></div>
                    <button type="submit" class="btn btn-primary w-100">注册</button>
                </form>
                <div id="msg" class="text-danger text-center mt-3"></div>
            </div>
        </div>
    </div>
    <script src="/myWeb/js/common.js"></script>
    <script>
    document.getElementById('userForm').addEventListener('submit',async e=>{
        e.preventDefault();
        const data=Object.fromEntries(new FormData(e.target));
        const res=await $post('/api/user/add',data);
        document.getElementById('msg').innerText=res.msg;
    });
    </script>
</body>
</html>
