<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>在线考试管理系统 - 登录</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f5f5; height:100vh; display:flex; align-items:center; justify-content:center; }
        .login-card { width:400px; }
    </style>
</head>
<body>
    <div class="card shadow login-card">
        <div class="card-header bg-primary text-white text-center py-3">
            <h4 class="mb-0">University<br>在线考试管理系统</h4>
        </div>
        <div class="card-body p-4">
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-control" name="userName" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-control" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">登 录</button>
            </form>
            <div id="errMsg" class="text-danger text-center mt-3"></div>
        </div>
    </div>
    <script src="/myWeb/js/common.js"></script>
    <script>
    document.getElementById('loginForm').addEventListener('submit', async e => {
        e.preventDefault();
        const data = Object.fromEntries(new FormData(e.target));
        const res = await $post('/api/login', data);
        if (res.code === 200) {
            window.location.href = '/myWeb/index.html';
        } else {
            document.getElementById('errMsg').innerText = res.msg;
        }
    });
    </script>
</body>
</html>
